name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --all-features

      - name: Prepare binary name
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            mv target/release/filefinder.exe filefinder.exe
            echo "ASSET_NAME=filefinder.exe" >> $GITHUB_ENV
          else
            echo "ASSET_NAME=filefinder" >> $GITHUB_ENV
          fi

      - name: Upload binary
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.inputs.upload_url || github.event.release.upload_url }}
          asset_path: target/release/${{ env.ASSET_NAME }}
          asset_name: ${{ env.ASSET_NAME }}
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: github.event.inputs.upload_url != '' || startsWith(github.ref, 'refs/tags/v')
