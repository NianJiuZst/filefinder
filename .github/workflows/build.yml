name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --all-features

      - name: Prepare binary name
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            cp target/release/filefinder.exe filefinder.exe
            echo "ASSET_NAME=filefinder.exe" >> $GITHUB_ENV
          else
            echo "ASSET_NAME=filefinder" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filefinder-${{ matrix.platform }}
          path: target/release/${{ env.ASSET_NAME }}
          retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "filefinder ${{ github.ref_name }}" \
            --notes "Multi-platform binary release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux binary
        run: gh release upload ${{ github.ref_name }} artifacts/filefinder-ubuntu-latest/filefinder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS binary
        run: gh release upload ${{ github.ref_name }} artifacts/filefinder-macos-latest/filefinder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows binary
        run: gh release upload ${{ github.ref_name }} artifacts/filefinder-windows-latest/filefinder.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
